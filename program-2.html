<!DOCTYPE html>
<html>
<head>
    <title>Shopping List App</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            border-bottom: 3px solid #FF9800;
            padding-bottom: 10px;
        }
        .input-section {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-add {
            background-color: #FF9800;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-add:hover {
            background-color: #e68900;
        }
        .btn-remove {
            background-color: #f44336;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-remove:hover {
            background-color: #da190b;
        }
        .list-section {
            margin-top: 30px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background-color: #f9f9f9;
            padding: 15px;
            margin: 10px 0;
            border-left: 5px solid #FF9800;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
        }
        li span {
            font-size: 16px;
            font-weight: bold;
        }
        .empty-message {
            color: #999;
            text-align: center;
            padding: 30px;
            font-size: 16px;
        }
        .count {
            background-color: #e3f2fd;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #1976d2;
        }
    </style>
</head>
<body>

    <div ng-app="shoppingApp" ng-controller="shoppingCtrl" class="container">
        
        <h2>🛒 Shopping List App</h2>
        
        <div class="input-section">
            <input 
                type="text" 
                ng-model="newItem" 
                placeholder="Add a new item (e.g., Milk, Bread, Eggs)"
                ng-keyup="$event.keyCode === 13 && addItem()">
            <button class="btn-add" ng-click="addItem()">➕ Add Item</button>
        </div>
        
        <div class="count">
            Total Items: {{ items.length }}
        </div>
        
        <div class="list-section">
            <h3>Items in Your Cart:</h3>
            
            <div ng-if="items.length === 0" class="empty-message">
                📭 No items in your shopping list. Add some!
            </div>
            
            <ul ng-if="items.length > 0">
                <!-- ng-repeat = Loop through each item -->
                <li ng-repeat="item in items">
                    <span>{{ item }}</span>
                    <button class="btn-remove" ng-click="removeItem($index)">🗑️ Remove</button>
                </li>
            </ul>
        </div>
        
    </div>

    <script>
        angular.module('shoppingApp', [])
            .controller('shoppingCtrl', function($scope) {
                
                // Default shopping items
                $scope.items = ['Apples', 'Bananas', 'Bread', 'Milk'];
                
                // New item input field ko khali rakhne ke liye
                $scope.newItem = '';
                
                // ADD FUNCTION - Naya item add karne ke liye
                $scope.addItem = function() {
                    // Agar input khali nahi hai
                    if ($scope.newItem && $scope.newItem.trim() !== '') {
                        // Array mein item push karo
                        $scope.items.push($scope.newItem);
                        
                        // Input field ko khali karo
                        $scope.newItem = '';
                    }
                };
                
                // REMOVE FUNCTION - Item delete karne ke liye
                $scope.removeItem = function(index) {
                    // Index se 1 item remove karo
                    $scope.items.splice(index, 1);
                };
                
            });
    </script>

</body>
</html>
