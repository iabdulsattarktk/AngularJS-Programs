<!DOCTYPE html>
<html ng-app="mathApp">
<head>
    <title>Math Operations - Factorial & Square</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .math-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        input {
            width: 80%;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #3498db; }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        button:hover { background-color: #2980b9; transform: translateY(-2px); }
        .output-section {
            margin-top: 25px;
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
        }
        .output-item { margin: 10px 0; font-size: 18px; color: #34495e; }
        .val { font-weight: bold; color: #e67e22; }
    </style>
</head>
<body ng-controller="mathController">

    <div class="math-card">
        <h2>Math Tools</h2>
        <input type="number" ng-model="inputNum" placeholder="Enter a number (e.g. 5)">
        <br>
        <button ng-click="compute()">Calculate Now</button>

        <div class="output-section" ng-show="square !== undefined">
            <div class="output-item">Square: <span class="val">{{square}}</span></div>
            <div class="output-item">Factorial: <span class="val">{{factorial}}</span></div>
        </div>
    </div>

    <script>
        var app = angular.module('mathApp', []);
        app.controller('mathController', function($scope) {
            $scope.compute = function() {
                var n = parseInt($scope.inputNum);
                
                if (isNaN(n) || n < 0) {
                    alert("Please enter a valid positive number");
                    return;
                }

                // Square Calculation
                $scope.square = n * n;
                
                // Factorial Calculation
                var result = 1;
                if (n === 0) {
                    result = 1;
                } else {
                    for (var i = 1; i <= n; i++) {
                        result *= i;
                    }
                }
                $scope.factorial = result;
            };
        });
    </script>
</body>
</html>
