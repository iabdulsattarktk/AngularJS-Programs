<!DOCTYPE html>
<html ng-app="dateApp">
<head>
    <title>AngularJS Date Filters</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .date-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }
        h2 { color: #2d3436; margin-bottom: 25px; border-bottom: 2px solid #00cec9; padding-bottom: 10px; }
        .date-card {
            background: #f9f9f9;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #00cec9;
            text-align: left;
        }
        .label {
            display: block;
            font-size: 12px;
            color: #636e72;
            text-transform: uppercase;
            font-weight: bold;
        }
        .value {
            display: block;
            font-size: 18px;
            color: #2d3436;
            margin-top: 5px;
        }
        .refresh-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #00cec9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .refresh-btn:hover { background-color: #00b894; }
    </style>
</head>
<body ng-controller="dateController">

<div class="date-container">
    <h2>Date & Time Filters</h2>

    <div class="date-card">
        <span class="label">Default Format:</span>
        <span class="value">{{ currentDateTime | date }}</span>
    </div>

    <div class="date-card">
        <span class="label">Full Date (Long):</span>
        <span class="value">{{ currentDateTime | date:'fullDate' }}</span>
    </div>

    <div class="date-card">
        <span class="label">Short Format:</span>
        <span class="value">{{ currentDateTime | date:'short' }}</span>
    </div>

    <div class="date-card">
        <span class="label">Custom (HH:mm:ss):</span>
        <span class="value">{{ currentDateTime | date:'HH:mm:ss a' }}</span>
    </div>

    <div class="date-card">
        <span class="label">Day of the Week:</span>
        <span class="value">{{ currentDateTime | date:'EEEE' }}</span>
    </div>

    <button class="refresh-btn" ng-click="updateDate()">Update Time</button>
</div>

<script>
    var app = angular.module('dateApp', []);
    app.controller('dateController', function($scope) {
        // Function to update date
        $scope.updateDate = function() {
            $scope.currentDateTime = new Date();
        };

        // Initialize first time
        $scope.updateDate();
    });
</script>

</body>
</html>
