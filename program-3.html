<!DOCTYPE html>
<html ng-app="calcApp">
<head>
    <title>Modern AngularJS Calculator</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calc-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #0056b3; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 6px;
            font-weight: bold;
            font-size: 20px;
            color: #28a745;
        }
    </style>
</head>
<body ng-controller="calcController">

    <div class="calc-container">
        <h2>Calculator</h2>
        <input type="number" ng-model="num1" placeholder="First Number">
        <input type="number" ng-model="num2" placeholder="Second Number">
        
        <div class="btn-group">
            <button ng-click="calculate('+')">+</button>
            <button ng-click="calculate('-')">-</button>
            <button ng-click="calculate('*')">×</button>
            <button ng-click="calculate('/')">÷</button>
        </div>

        <div class="result-box" ng-show="result !== undefined">
            Result: {{result}}
        </div>
    </div>

    <script>
        var app = angular.module('calcApp', []);
        app.controller('calcController', function($scope) {
            $scope.calculate = function(op) {
                var a = parseFloat($scope.num1);
                var b = parseFloat($scope.num2);
                
                if (isNaN(a) || isNaN(b)) {
                    $scope.result = "Enter numbers!";
                    return;
                }

                if (op == '+') $scope.result = a + b;
                if (op == '-') $scope.result = a - b;
                if (op == '*') $scope.result = a * b;
                if (op == '/') {
                    $scope.result = (b !== 0) ? (a / b).toFixed(2) : "Error (Div by 0)";
                }
            };
        });
    </script>
</body>
</html>
